name: Debug Hermes Agent

# Manual only. Opens an ephemeral SSH-over-IAP session to the VM, runs one
# read-only (or restart) operational command via the installed `hermes-ops`
# helper, prints the result in this run's log, then tears the session down.
# No secrets are read by this workflow -- it never touches GEMINI_API_KEY,
# TELEGRAM_BOT_TOKEN, etc.; it only inspects/controls the already-running
# service on the VM.
#
# Requires the deploy service account's project-level IAM bindings (IAP
# tunnel access + OS Login admin), which the Deploy workflow self-grants on
# its first successful run. Run Deploy at least once before using this.
on:
  workflow_dispatch:
    inputs:
      action:
        description: "Operation to run on the VM"
        type: choice
        options:
          - logs
          - status
          - journal-boot
          - env-check
          - doctor
          - restart
        default: logs
      lines:
        description: "Number of log lines to tail (only used by 'logs')"
        type: string
        default: "200"

permissions:
  contents: read

concurrency:
  # Shares deploy.yml/destroy.yml/sync.yml's group: all four touch the same
  # VM/SSH session, so they must queue rather than run concurrently (e.g. a
  # "restart" here mid-way through a live Deploy apply, or racing sync.yml's
  # rsync against a Deploy that is actively rewriting files). cancel-in-progress
  # must stay false here too -- true would let a debug run cancel a live
  # Terraform apply/destroy queued in the same group.
  group: hermes-infra
  cancel-in-progress: false

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve configuration
        id: cfg
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          if [ -z "${PROJECT_ID}" ]; then
            PROJECT_ID="$(jq -r '.project_id' "${GOOGLE_APPLICATION_CREDENTIALS}")"
          fi
          [ -n "${PROJECT_ID}" ] && [ "${PROJECT_ID}" != "null" ] || { echo "Could not resolve project_id"; exit 1; }
          ZONE="${{ vars.GCP_ZONE }}";            ZONE="${ZONE:-us-central1-a}"
          VM_NAME="${{ vars.GCP_VM_NAME }}";      VM_NAME="${VM_NAME:-hermes-agent}"
          HERMES_USER="${{ vars.HERMES_USER }}";  HERMES_USER="${HERMES_USER:-hermes}"
          HERMES_HOME="${{ vars.HERMES_HOME }}";  HERMES_HOME="${HERMES_HOME:-/home/hermes}"
          {
            echo "project_id=${PROJECT_ID}"
            echo "zone=${ZONE}"
            echo "vm_name=${VM_NAME}"
            echo "hermes_user=${HERMES_USER}"
            echo "hermes_home=${HERMES_HOME}"
            echo "hermes_config_dir=${HERMES_HOME}/.hermes"
          } >> "${GITHUB_OUTPUT}"

      - name: Establish ephemeral SSH over IAP
        id: ssh
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ENV_FILE="$(scripts/ssh-iap.sh up)"
          echo "env_file=${ENV_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Run hermes-ops on the VM
        env:
          HERMES_USER: ${{ steps.cfg.outputs.hermes_user }}
          HERMES_HOME: ${{ steps.cfg.outputs.hermes_home }}
          HERMES_CONFIG_DIR: ${{ steps.cfg.outputs.hermes_config_dir }}
          ACTION: ${{ inputs.action }}
          LINES: ${{ inputs.lines }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          SSH="ssh -i ${SSH_KEY} -p ${SSH_PORT} ${SSH_OPTS} ${SSH_USER}@localhost"

          for i in $(seq 1 30); do
            if ${SSH} true 2>/dev/null; then break; fi
            [ "${i}" = "30" ] && { echo "VM SSH not ready"; exit 1; }
            sleep 5
          done

          ${SSH} "sudo HERMES_USER='${HERMES_USER}' HERMES_HOME='${HERMES_HOME}' HERMES_CONFIG_DIR='${HERMES_CONFIG_DIR}' LINES='${LINES}' bash /usr/local/bin/hermes-ops ${ACTION}"

      - name: Tear down ephemeral SSH
        if: always()
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: scripts/ssh-iap.sh down || true
