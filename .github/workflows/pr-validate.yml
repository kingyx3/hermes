name: PR Validation

# Validates Terraform and scripts on pull requests. Never applies infra and
# never uses secrets, so it is safe for untrusted forks.
on:
  pull_request:
    paths:
      - "terraform/**"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: terraform
        run: |
          set -euo pipefail
          # No backend/credentials on PRs — validate config syntax/consistency only.
          terraform init -backend=false
          terraform validate

  scripts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck scripts/*.sh
