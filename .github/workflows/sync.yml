name: Sync Hermes Snapshot

# Pulls the VM's .hermes + workspace back into the repo. Runs daily at midnight
# Singapore time (16:00 UTC) and can be triggered manually. Almost all work
# happens on the runner; the VM only serves files over rsync/IAP.
on:
  schedule:
    - cron: "0 16 * * *" # 00:00 Asia/Singapore (UTC+8)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pull and diff but do not commit/push"
        type: boolean
        default: false
      branch:
        description: "Target branch to commit to (blank = main)"
        type: string
        default: ""

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: hermes-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve configuration
        id: cfg
        run: |
          set -euo pipefail
          PROJECT_ID="${{ vars.GCP_PROJECT_ID }}"
          if [ -z "${PROJECT_ID}" ]; then
            PROJECT_ID="$(jq -r '.project_id' "${GOOGLE_APPLICATION_CREDENTIALS}")"
          fi
          [ -n "${PROJECT_ID}" ] && [ "${PROJECT_ID}" != "null" ] || { echo "Could not resolve project_id"; exit 1; }
          ZONE="${{ vars.GCP_ZONE }}";            ZONE="${ZONE:-us-central1-a}"
          VM_NAME="${{ vars.GCP_VM_NAME }}";      VM_NAME="${VM_NAME:-hermes-agent}"
          HERMES_USER="${{ vars.HERMES_USER }}";  HERMES_USER="${HERMES_USER:-hermes}"
          HERMES_HOME="${{ vars.HERMES_HOME }}";  HERMES_HOME="${HERMES_HOME:-/home/hermes}"
          {
            echo "project_id=${PROJECT_ID}"
            echo "zone=${ZONE}"
            echo "vm_name=${VM_NAME}"
            echo "hermes_user=${HERMES_USER}"
            echo "hermes_config_dir=${HERMES_HOME}/.hermes"
            echo "workspace_dir=${HERMES_HOME}/workspace"
          } >> "${GITHUB_OUTPUT}"

      - name: Establish ephemeral SSH over IAP
        id: ssh
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: |
          set -euo pipefail
          chmod +x scripts/*.sh
          ENV_FILE="$(scripts/ssh-iap.sh up)"
          echo "env_file=${ENV_FILE}" >> "${GITHUB_OUTPUT}"

      - name: Pull snapshot from VM
        env:
          HERMES_CONFIG_DIR: ${{ steps.cfg.outputs.hermes_config_dir }}
          WORKSPACE_DIR: ${{ steps.cfg.outputs.workspace_dir }}
          HERMES_OWNER: ${{ steps.cfg.outputs.hermes_user }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1090
          source "${{ steps.ssh.outputs.env_file }}"
          scripts/sync-pull.sh

      - name: Tear down ephemeral SSH
        if: always()
        env:
          VM_NAME: ${{ steps.cfg.outputs.vm_name }}
          ZONE: ${{ steps.cfg.outputs.zone }}
          PROJECT_ID: ${{ steps.cfg.outputs.project_id }}
        run: scripts/ssh-iap.sh down || true

      - name: Commit and push snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ inputs.branch || 'main' }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: scripts/sync-commit.sh
